name: android-build

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject graphics
        run: |
          rm -rf apps/web/public/graphic-packs
          cp -r node_modules/@pillage-first/graphics/dist/graphic-packs apps/web/public/graphic-packs

      - name: Build web app
        run: npx turbo run build --filter="@pillage-first/web"

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/web/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pillage-first-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
