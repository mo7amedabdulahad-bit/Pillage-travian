name: android-build
permissions:
  contents: read
  id-token: write
on:
  push:
    branches:
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - develop
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
env:
  TURBO_CACHE_DIR: .turbo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build web app
        run: npx turbo run build --filter="@pillage-first/web"
      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync android
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES" ]; then
            echo "$GOOGLE_SERVICES" > apps/web/android/app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set, skipping"
          fi
      - name: Decode keystore
        env:
          KEYSTORE_SECRET: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -n "$KEYSTORE_SECRET" ]; then
            echo "$KEYSTORE_SECRET" | base64 --decode > ${{ github.workspace }}/apps/web/android/app/pillage-first.jks
            echo "KEYSTORE_PATH=${{ github.workspace }}/apps/web/android/app/pillage-first.jks" >> $GITHUB_ENV
          else
            echo "KEYSTORE_PATH=" >> $GITHUB_ENV
          fi
      - name: Build release APK
        working-directory: apps/web/android
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pillage-first-release-apk
          path: apps/web/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      - name: Upload to Firebase App Distribution
        if: ${{ success() && !cancelled() }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_APP: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [ -z "$FIREBASE_APP" ]; then
            echo "WARNING: FIREBASE_APP_ID secret not set, skipping Firebase upload"
            exit 0
          fi

          npm install -g firebase-tools --silent

          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Authenticating with FIREBASE_TOKEN..."
            firebase appdistribution:distribute \
              apps/web/android/app/build/outputs/apk/release/app-release.apk \
              --app "$FIREBASE_APP" \
              --groups testers \
              --token "$FIREBASE_TOKEN" \
              --release-notes "Build ${{ github.run_number }} from commit ${{ github.sha }}"
          elif [ -n "$FIREBASE_SA_JSON" ]; then
            echo "Authenticating with service account..."
            echo "$FIREBASE_SA_JSON" > /tmp/firebase-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
            firebase appdistribution:distribute \
              apps/web/android/app/build/outputs/apk/release/app-release.apk \
              --app "$FIREBASE_APP" \
              --groups testers \
              --release-notes "Build ${{ github.run_number }} from commit ${{ github.sha }}"
            rm -f /tmp/firebase-sa.json
          else
            echo "ERROR: Neither FIREBASE_TOKEN nor FIREBASE_SERVICE_ACCOUNT is set."
            echo "Please add one of these secrets in GitHub repo settings."
            echo "  - FIREBASE_TOKEN: Run 'firebase login:ci' locally and paste the token."
            echo "  - FIREBASE_SERVICE_ACCOUNT: Paste the service account JSON."
            exit 1
          fi
